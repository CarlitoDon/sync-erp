[build]
builder = "nixpacks"
buildCommand = "npx turbo run build --filter=@sync-erp/bot..."

[deploy]
startCommand = "npm start --workspace=@sync-erp/bot --omit=dev"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Watch patterns to trigger redeploy only when relevant code changes
watchPatterns = ["apps/bot/**", "packages/**"]
