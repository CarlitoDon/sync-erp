[build]
builder = "nixpacks"
buildCommand = "npx turbo run build --filter=@sync-erp/bot..."

[deploy]
startCommand = "npm start --workspace=@sync-erp/bot"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Watch paths to trigger redeploy only when relevant code changes
watchPaths = ["apps/bot/**", "packages/**"]
