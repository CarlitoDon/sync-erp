[build]
builder = "RAILPACK"

# Service 1: API (Main Backend + Database Migrator)
[[services]]
name = "api"
root = "apps/api"
buildCommand = "npx turbo run build --filter=@sync-erp/api..."
startCommand = "npm run db:deploy --workspace=@sync-erp/database && node apps/api/dist/index.js"
watchPaths = [
  "apps/api/**",
  "packages/database/**",
  "packages/shared/**",
  "package.json"
]

# Service 2: Bot (WhatsApp Service)
[[services]]
name = "bot"
root = "apps/bot"
buildCommand = "npx turbo run build --filter=@sync-erp/bot..."
startCommand = "node apps/bot/dist/index.js"
watchPaths = [
  "apps/bot/**",
  "packages/database/**",
  "packages/shared/**",
  "package.json"
]

