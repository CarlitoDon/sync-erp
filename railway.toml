[build]
builder = "dockerfile"

# Service 1: API (Main Backend + Database Migrator)
[[services]]
name = "api"
root = "."
dockerfilePath = "Dockerfile.api"
watchPaths = ["apps/api/**", "packages/**"]

# Service 2: Bot (WhatsApp Service)
[[services]]
name = "bot"
root = "."
dockerfilePath = "Dockerfile.bot"
watchPaths = ["apps/bot/**", "packages/**"]

