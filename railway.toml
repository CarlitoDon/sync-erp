[build]
builder = "dockerfile"

# Service 1: API (Main Backend + Database Migrator)
[[services]]
name = "api"
root = "."
dockerfilePath = "Dockerfile.api"
watchPaths = [
  "apps/api/**",
  "packages/database/**",
  "packages/shared/**",
  "Dockerfile.api",
  "package.json"
]

# Service 2: Bot (WhatsApp Service)
[[services]]
name = "bot"
root = "."
dockerfilePath = "Dockerfile.bot"
watchPaths = [
  "apps/bot/**",
  "packages/database/**",
  "packages/shared/**",
  "Dockerfile.bot",
  "package.json"
]

[services.bot.variables]
SYNC_ERP_API_URL = "https://sync-erp-api-production.up.railway.app/api/trpc"

