name: Deploy Bot

on:
  push:
    branches: [main, dev]
    paths:
      - apps/bot/**
      - packages/**

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build Packages
        run: |
          npm run build --workspace=@sync-erp/shared
          npm run build --workspace=@sync-erp/database

      - run: npm run build --workspace=@sync-erp/bot

      - name: Skip Railway deploy (handled by Railway)
        run: |
          echo "Skipping 'railway up' — Railway auto-deploy handles this."
        env:
          RAILWAY_TOKEN: ${{ github.ref == 'refs/heads/dev' && secrets.RAILWAY_TOKEN_STAGING || secrets.RAILWAY_TOKEN }}
