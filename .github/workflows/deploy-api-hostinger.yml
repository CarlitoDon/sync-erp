name: Deploy API to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/database/**'
      - 'packages/shared/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Clean Prisma generated files
        run: rm -rf packages/database/src/generated packages/shared/src/generated node_modules/.prisma
        working-directory: .

      - name: Generate Prisma Client
        run: npm run db:generate
        working-directory: packages/database

      - name: Build API
        run: npm run build:api
        working-directory: .

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.pro.json deploy/package.json
          mkdir -p deploy/prisma
          cp ../../packages/database/prisma/schema.prisma deploy/prisma/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Hostinger
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          SSH_PASSPHRASE: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)

          # Create dummy askpass script to handle passphrase
          echo 'echo "$SSH_PASSPHRASE"' > ~/.ssh/askpass
          chmod +x ~/.ssh/askpass

          export SSH_ASKPASS=~/.ssh/askpass
          export DISPLAY=:0 # Needed for some ssh versions to trigger askpass

          ssh-add ~/.ssh/id_ed25519

          # Upload files with excludes to prevent deleting config/deps
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.env' \
            --exclude='node_modules' \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            deploy/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/apps/api/

          # Install dependencies (if package.json changed) and restart
          ssh -p 65002 -o StrictHostKeyChecking=no ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
            export PATH=/opt/alt/alt-nodejs20/root/usr/bin:$PATH
            cd ~/public_html/apps/api
            rm -rf node_modules
            npm install --production
            npx prisma generate
            # Restart via cPanel API or touch restart.txt
            touch tmp/restart.txt 2>/dev/null || true
          EOF
