name: Deploy API to Hostinger

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - 'packages/database/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    env:
      # Set deployment target based on branch or manual input
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      DEPLOY_PATH: ${{ github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main' && 'apps/api' || 'apps/api-staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set deployment variables
        id: vars
        run: |
          if [[ "${{ env.DEPLOY_ENV }}" == "production" ]]; then
            echo "deploy_path=apps/api" >> $GITHUB_OUTPUT
            echo "env_name=production" >> $GITHUB_OUTPUT
          else
            echo "deploy_path=apps/api-staging" >> $GITHUB_OUTPUT
            echo "env_name=staging" >> $GITHUB_OUTPUT
          fi
          echo "Deploying to: ${{ env.DEPLOY_ENV }}"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Clean Prisma generated files
        run: rm -rf packages/database/src/generated packages/shared/src/generated node_modules/.prisma
        working-directory: .

      - name: Generate Prisma Client
        run: npm run db:generate
        working-directory: packages/database

      - name: Build API
        run: npm run build:api
        working-directory: .

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.pro.json deploy/package.json
          mkdir -p deploy/prisma
          cp ../../packages/database/prisma/schema.prisma deploy/prisma/

          # Copy @sync-erp/database package to node_modules (since it's externalized)
          mkdir -p deploy/node_modules/@sync-erp/database
          cp -r ../../packages/database/dist deploy/node_modules/@sync-erp/database/
          cp ../../packages/database/package.json deploy/node_modules/@sync-erp/database/
          # Also copy generated Prisma client (needed for WASM runtime resolution)
          cp -r ../../packages/database/src/generated deploy/node_modules/@sync-erp/database/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Clear any cached host keys and add fresh one
          ssh-keyscan -p 65002 ${{ secrets.HOSTINGER_HOST }} > ~/.ssh/known_hosts 2>/dev/null
          # Also configure to accept new keys automatically
          echo "Host *" >> ~/.ssh/config
          echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config
          echo "  UserKnownHostsFile ~/.ssh/known_hosts" >> ~/.ssh/config

      - name: Deploy to Hostinger
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          SSH_PASSPHRASE: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          DEPLOY_DIR: ${{ steps.vars.outputs.deploy_path }}
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)

          # Create dummy askpass script to handle passphrase
          echo 'echo "$SSH_PASSPHRASE"' > ~/.ssh/askpass
          chmod +x ~/.ssh/askpass

          export SSH_ASKPASS=~/.ssh/askpass
          export DISPLAY=:0 # Needed for some ssh versions to trigger askpass

          ssh-add ~/.ssh/id_ed25519

          echo "Deploying to: ~/public_html/$DEPLOY_DIR"

          # Upload files with excludes to prevent deleting config/deps
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.env' \
            --exclude='node_modules' \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            deploy/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/$DEPLOY_DIR/

          # Install dependencies (if package.json changed) and restart
          ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} <<EOF
            export PATH=/opt/alt/alt-nodejs20/root/usr/bin:\$PATH
            cd ~/public_html/$DEPLOY_DIR
            rm -rf node_modules
            npm install --production
            npx prisma generate
            # Restart via cPanel API or touch restart.txt
            touch tmp/restart.txt 2>/dev/null || true
          EOF

          # Copy @sync-erp/database to node_modules (after npm install so it won't be deleted)
          rsync -avz \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            deploy/node_modules/@sync-erp/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/$DEPLOY_DIR/node_modules/@sync-erp/
