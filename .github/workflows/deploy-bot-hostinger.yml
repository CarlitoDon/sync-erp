name: Deploy Bot to Hostinger

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/bot/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bot

    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set deployment variables
        id: vars
        run: |
          if [[ "${{ env.DEPLOY_ENV }}" == "production" ]]; then
            echo "deploy_path=apps/bot" >> $GITHUB_OUTPUT
          else
            echo "deploy_path=apps/bot-staging" >> $GITHUB_OUTPUT
          fi
          echo "Deploying to: ${{ env.DEPLOY_ENV }}"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build Bot
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.pro.json deploy/package.json
          mkdir -p deploy/prisma
          cp ../../packages/database/prisma/schema.prisma deploy/prisma/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Hostinger
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          SSH_PASSPHRASE: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          DEPLOY_DIR: ${{ steps.vars.outputs.deploy_path }}
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)

          echo 'echo "$SSH_PASSPHRASE"' > ~/.ssh/askpass
          chmod +x ~/.ssh/askpass
          export SSH_ASKPASS=~/.ssh/askpass
          export DISPLAY=:0

          ssh-add ~/.ssh/id_ed25519

          echo "Deploying to: ~/public_html/$DEPLOY_DIR"

          # Upload files
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='node_modules' \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            deploy/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/$DEPLOY_DIR/

          # Install dependencies and restart
          ssh -p 65002 -o StrictHostKeyChecking=no ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} <<EOF
            export PATH=/opt/alt/alt-nodejs20/root/usr/bin:\$PATH
            cd ~/public_html/$DEPLOY_DIR
            npm install --production
            touch tmp/restart.txt 2>/dev/null || true
          EOF
